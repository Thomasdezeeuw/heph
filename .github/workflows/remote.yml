name: Heph-remote
on:
  push:
    branches: [ main ]
    paths:
      - "remote/**"
      - ".github/workflows/remote.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "remote/**"
      - ".github/workflows/remote.yml"
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
jobs:
  Test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - name: Install Cargo-hack
      run: cargo install --debug cargo-hack
    - uses: ./.github/actions/test
      with:
        working-directory: remote
  Sanitiser:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # LeakSanitizer is broken, see
        # <https://github.com/rust-lang/rust/issues/111073>.
        sanitiser: [address, memory, thread] # leak
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/test_sanitizer
      with:
        sanitizer: ${{ matrix.sanitiser }}
        working-directory: remote
  Clippy:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/clippy
      with:
        working-directory: remote
  Rustfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/rustfmt
      with:
        working-directory: remote
  Docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/rustdoc
      with:
        working-directory: remote
